<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Elpis · Material UI kit demo</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0a0b12; color: #cdd2e6;
        font-family: system-ui, sans-serif; overflow: hidden; }
      #elpis-canvas { display: block; width: 100vw; height: 100vh; }
      #unsupported { position: fixed; inset: 0; display: none; place-content: center;
        text-align: center; padding: 2rem; }
      #unsupported a { color: #66ccff; }
      .wrap { max-width: 32rem; margin: auto; }
      #demo-switch { position: fixed; top: 0.75rem; right: 0.75rem; z-index: 10;
        background: rgba(10, 11, 18, 0.72); border: 1px solid rgba(205, 210, 230, 0.25);
        border-radius: 999px; padding: 0.4rem 0.9rem; font-size: 0.8rem;
        backdrop-filter: blur(8px); }
      #demo-switch a { color: #66ccff; text-decoration: none; }
      #demo-switch a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div id="demo-switch">Material UI kit demo · <a href="./index.html">try the Glass UI kit demo →</a></div>
    <canvas id="elpis-canvas"></canvas>
    <div id="unsupported">
      <div class="wrap">
        <h1>WebGPU required</h1>
        <p>This demo renders with Blinc's WebGPU backend. Open it in a
        WebGPU-capable browser (Chrome / Edge 113+, or Safari 18+).</p>
      </div>
    </div>
    <script type="module">
      if (!('gpu' in navigator)) {
        document.getElementById('unsupported').style.display = 'grid';
        document.getElementById('elpis-canvas').style.display = 'none';
      } else {
        import('./pkg-material/elpis_web.js').then((m) => m.default()).catch((e) => {
          console.error('Failed to start Elpis Material UI kit demo:', e);
        });
      }
    </script>
  </body>
</html>
